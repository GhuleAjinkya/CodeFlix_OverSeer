
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | OVERSEER</title>
  <!-- v3 cache bust -->
  <link rel="stylesheet" href="css/style.css?v=3">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="login-page">

  <header class="navbar">
    <div class="logo">OVERSEER</div>
    <div class="nav-buttons">
      <button id="themeToggle">🌙</button>
      <a href="index.html" class="login-btn">Home</a>
    </div>
  </header>

  <section class="login-container">
    <div class="login-card">
      <h2>Sign in</h2>
      <p class="login-subtext">
        Connect GitHub to start monitoring your project
      </p>
      <a href="http://localhost:8000/auth/github" class="github-login" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="github-icon" alt="GitHub">
        Continue with GitHub
      </a>

      <div class="divider">OR</div>

      <form>
        <input type="email" placeholder="Email address">
        <input type="password" placeholder="Password">
        <button type="button" class="login-submit">Login</button>
      </form>
    </div>
  </section>

  <script src="JS/auth.js"></script>
  <script src="JS/script.js?v=3"></script>
</body>
</html>
